name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No API token is stored anywhere: PyPI verifies the workflow's
# short-lived OIDC identity instead. Configure the trusted publisher once at
# https://pypi.org/manage/project/<name>/settings/publishing/

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
