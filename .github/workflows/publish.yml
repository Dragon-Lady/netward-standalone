name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No API token is stored anywhere: PyPI verifies the workflow's
# short-lived OIDC identity instead. Configure the trusted publisher once at
# https://pypi.org/manage/project/<name>/settings/publishing/
#
# The publish job is gated on `test`: the buyer-hygiene + full suite must pass
# before anything is built or uploaded. This is the hard stop that prevents an
# un-scrubbed release (e.g. cross-product references) from ever reaching PyPI.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Buyer-hygiene gate (blocks publish on cross-product leaks)
        run: python -m pytest netward/test_buyer_hygiene.py -v
      - name: Full test suite
        run: python -m pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
